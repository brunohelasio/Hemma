# Activity Badge
# Shows media activity
hemma_badge_activity:
  template: [hemma_badge_base]
  show_state: false
  show_label: false
  show_entity_picture: true
  tap_action: { action: more-info }
  hold_action: { action: more-info }

  card_mod:
    style: >
      [[[
        const v = variables?.enabled;
        const isEnabled = () => {
          if (v === undefined || v === null) return true;
          if (typeof v === 'boolean') return v;
          if (typeof v === 'number') return v !== 0;
          const s = String(v).trim().toLowerCase();
          return !['false','0','no','off','disabled'].includes(s);
        };
        if (!isEnabled()) return ':host { display: none !important; }';
        const s = String(entity?.state || '').toLowerCase();
        const a = entity?.attributes || {};
        if (['playing','buffering','paused'].includes(s))
          return ':host { display: block; }';
        const title = String(a.media_title || a.title || '').trim();
        const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
        const app = String(a.app_name || a.source || '').trim();
        if (title || artist || app)
          return ':host { display: block; }';
        return ':host { display: none !important; }';
      ]]]

  styles:
    card:
      - padding: 0 14px 0 8px !important
      - background: rgba(0,0,0,0.18) !important
      - -webkit-backdrop-filter: blur(14px) saturate(1.2) !important
      - backdrop-filter: blur(14px) saturate(1.2) !important
      - border-radius: 9999px !important
      - overflow: hidden !important
      - width: fit-content !important
      - max-width: var(--badge-media-max-width-current, none) !important
      - min-height: calc(var(--badge-min-height-current, var(--badge-min-height, 50px)) + 3px) !important
      - align-items: center !important
      - justify-content: flex-start !important
      - text-align: left !important
      - gap: 6px !important
      - isolation: isolate
      - margin: 0 !important
      - justify-self: start !important
      - align-self: start !important
      - place-self: start !important
      - --badge-icon-size-current: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px))

      - display: >
          [[[
            const v = variables?.enabled;
            const isEnabled = () => {
              if (v === undefined || v === null) return true;
              if (typeof v === 'boolean') return v;
              if (typeof v === 'number')  return v !== 0;
              const s = String(v).trim().toLowerCase();
              if (['false','0','no','off','disabled'].includes(s)) return false;
              if (['true','1','yes','on','enabled'].includes(s))   return true;
              return !!s;
            };
            if (!isEnabled()) return 'none';

            const s = String(entity?.state || '').toLowerCase();
            const a = entity?.attributes || {};

            if (['playing','buffering','paused'].includes(s)) return 'inline-grid';

            const norm = (x) => String(x ?? '').trim();
            const title  = norm(a.media_title || a.title);
            const artist = norm(a.media_artist || a.artist || a.media_album_artist);
            const app    = norm(a.app_name || a.source);

            return (title || artist || app) ? 'inline-grid' : 'none';
          ]]]

      - --bg-url: >
          [[[
            const cacheKey = '_hemmaMediaBgUrl';
            const a = entity?.attributes || {};
            const pref = a.entity_picture_local || a.entity_picture || a.media_image_url;

            if (pref) {
              const url = String(pref).startsWith('/') ? `${location.origin}${pref}` : pref;
              const wrapped = `url("${url}")`;
              this[cacheKey] = wrapped;
              return wrapped;
            }
            return this[cacheKey] || 'none';
          ]]]

    grid:
      - grid-template-areas: '"i l"'
      - grid-template-columns: min-content minmax(0, 1fr)
      - column-gap: 6px
      - row-gap: 0
      - align-items: center

    name:
      - grid-area: l
      - padding: 0 !important
      - min-width: 0

    img_cell:
      - box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14) !important

    icon:
      - display: none

    entity_picture:
      - display: block
      - width: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important
      - height: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important
      - min-width: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important
      - min-height: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important

  name: >
    [[[
      const a = entity?.attributes || {};
      const friendly = a.friendly_name || 'Activity';
      const title  = String(a.media_title || a.title || '').trim();
      const artist = String(a.media_artist || a.artist || a.media_album_artist || '').trim();
      const app    = String(a.app_name || a.source || '').trim();
      const sub = (artist && title) ? `${artist} — ${title}` : (title || artist || app);
      const esc = (s) => String(s ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');

      return `
        <div class="badge-wrap">
          <div class="badge-title">${esc(friendly)}</div>
          <div class="badge-sub">${esc(sub || '')}</div>
        </div>
      `;
    ]]]

  extra_styles: |
    :host{
      --badge-after-z: 0;
      --badge-before-z: 1;
    }

    :host ha-card::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius: inherit;
      background: var(--bg-url);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(26px) saturate(1.5);
      opacity: .45;
      transform: scale(1.25);
    }

    :host ha-card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius: inherit;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.18),
        0 0 0 1px rgba(255,255,255,0.14);
    }

    #name{
      display:flex !important;
      align-items:center !important;
      padding-block: 2px !important;
      overflow: visible !important;
    }

    .badge-wrap{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:2px;
      min-width:0;
      max-width:100%;
      padding-top: 0 !important;
      padding-bottom: 2px !important;
      min-height: 0 !important;
    }

    .badge-title{
      font-size: var(--badge-font-size-current, 13px);
      font-weight: 700;
      line-height: 1.2;
      color: rgba(255,255,255,0.96);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow: 0 0 3px rgba(0,0,0,0.25);
    }

    .badge-sub{
      font-size: calc(var(--badge-font-size-current, 13px) - 1px);
      font-weight: 500;
      line-height: 1.15;
      opacity: .82;
      color: rgba(255,255,255,0.90);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow: 0 0 3px rgba(0,0,0,0.20);
    }

    #name, #name *{ overflow: visible !important; }

    #container{
      height: auto !important;
      min-height: 0 !important;
      align-items: center !important;
      align-content: center !important;
    }

    #container > #aspect-ratio,
    #img-cell,
    #name{
      position: relative !important;
      z-index: 6 !important;
      opacity: 1 !important;
    }


