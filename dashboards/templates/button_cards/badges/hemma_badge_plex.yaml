# Plex Badge
# Shows Plex activity
hemma_badge_plex:
  template: [hemma_badge_base]
  show_state: false
  show_label: false
  show_entity_picture: true

  card_mod:
    style: >
      [[[
        const v = variables?.enabled;
        const isEnabled = () => {
          if (v === undefined || v === null) return true;
          if (typeof v === 'boolean') return v;
          if (typeof v === 'number') return v !== 0;
          const s = String(v).trim().toLowerCase();
          return !['false','0','no','off','disabled'].includes(s);
        };
        if (!isEnabled()) return ':host { display: none !important; }';
        const show = String(entity?.state || 'off').toLowerCase() === 'on';
        return show
          ? ':host { display: block; }'
          : ':host { display: none !important; }';
      ]]]

  tap_action:
    action: more-info
    entity: >
      [[[
        return variables?.session_entity || entity?.entity_id;
      ]]]
  hold_action:
    action: more-info
    entity: >
      [[[
        return variables?.session_entity || entity?.entity_id;
      ]]]

  triggers_update:
    - '[[[ return variables?.session_entity || entity?.entity_id; ]]]'
    - '[[[ return entity?.entity_id; ]]]'

  styles:
    card:
      - padding: 0 14px 0 8px !important
      - background: rgba(0,0,0,0.18) !important
      - -webkit-backdrop-filter: blur(14px) saturate(1.2) !important
      - backdrop-filter: blur(14px) saturate(1.2) !important
      - border-radius: 9999px !important
      - overflow: hidden !important
      - width: fit-content !important
      - max-width: var(--badge-media-max-width-current, none) !important
      - min-height: calc(var(--badge-min-height-current, var(--badge-min-height, 50px)) + 3px) !important
      - align-items: center !important
      - justify-content: flex-start !important
      - text-align: left !important
      - gap: 6px !important
      - isolation: isolate
      - margin: 0 !important
      - justify-self: start !important
      - align-self: start !important
      - place-self: start !important
      - --badge-icon-size-current: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px))

      - display: >
          [[[
            const st = String(entity?.state || 'off').toLowerCase();
            return (st === 'on') ? 'inline-grid' : 'none';
          ]]]

      - --bg-url: >
          [[[
            const cacheKey = '_hemmaPlexBgUrl';
            const sid = variables?.session_entity;
            const a = (sid && hass.states[sid]?.attributes) || {};
            const raw =
              a.image_url ||
              a.entity_picture_local ||
              a.entity_picture ||
              a.media_image_url;

            if (raw) {
              const url = String(raw).startsWith('/') ? `${location.origin}${raw}` : raw;
              const wrapped = `url("${url}")`;
              this[cacheKey] = wrapped;
              return wrapped;
            }
            return this[cacheKey] || 'none';
          ]]]

    grid:
      - grid-template-areas: '"i l"'
      - grid-template-columns: min-content minmax(0, 1fr)
      - column-gap: 6px
      - align-items: center

    name:
      - grid-area: l
      - padding: 0 0 0 6px !important
      - min-width: 0
      - max-width: 100%
      - z-index: 3
      - align-self: center !important
      - display: flex !important
      - align-items: center !important
      - overflow: hidden !important
      - padding-block: 2px !important
      - line-height: normal !important

    img_cell:
      - box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14) !important

    icon:
      - display: none

    entity_picture:
      - display: block
      - width: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important
      - height: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important
      - min-width: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important
      - min-height: var(--badge-media-icon-size-current, var(--badge-media-icon-size, 44px)) !important

  entity_picture: >
    [[[
      const sid = variables?.session_entity;
      const a = (sid && hass.states[sid]?.attributes) || {};
      const raw =
        a.image_url ||
        a.entity_picture_local ||
        a.entity_picture ||
        a.media_image_url;

      if (!raw) return null;
      return String(raw).startsWith('/') ? `${location.origin}${raw}` : raw;
    ]]]

  name: >
    [[[
      const sid = variables?.session_entity;
      const a = (sid && hass.states[sid]?.attributes) || {};
      const plexUser = a.user || 'Unknown';
      const full = a.full_title || a.title || '';

      const esc = (s) => String(s ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');

      return `
        <div class="badge-wrap">
          <div class="badge-title">Plex — ${esc(plexUser)}</div>
          <div class="badge-sub">${esc(full)}</div>
        </div>
      `;
    ]]]

  extra_styles: |
    :host{
      --hemma-badge-title: var(--badge-font-size-current, var(--badge-font-size, 15px));
      --hemma-badge-sub: calc(var(--hemma-badge-title) - 2px);
      --badge-after-z: 0;
      --badge-before-z: 1;
    }

    /* Mobile Portrait */
    @media (max-width: 767px) and (orientation: portrait) {
      :host {
        --hemma-badge-title: 13px;
        --hemma-badge-sub: 12px;
      }
      ha-card {
        min-height: 43px !important;
        padding: 2px 18px 2px 6px !important;
      }
    }

    /* Mobile Landscape */
    @media (max-height: 600px) and (orientation: landscape) {
      :host {
        --hemma-badge-title: 12px;
        --hemma-badge-sub: 11px;
      }
      ha-card {
        min-height: 36px !important;
        padding: 1px 16px 1px 6px !important;
      }
    }

    :host ha-card::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius: inherit;
      background: var(--bg-url);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(26px) saturate(1.4);
      opacity: .45;
      transform: scale(1.25);
    }

    :host ha-card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius: inherit;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.18),
        0 0 0 1px rgba(255,255,255,0.14);
    }

    #container{
      height: auto !important;
      min-height: 0 !important;
      align-items: center !important;
      align-content: center !important;
    }

    .badge-wrap{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:2px;
      min-width:0;
      max-width:100%;
      overflow:hidden;
      padding-top: 0 !important;
      padding-bottom: 2px !important;
    }

    .badge-title{
      font-size: var(--hemma-badge-title);
      font-weight: 700;
      line-height: 1.14;
      color: rgba(255,255,255,0.96);
      min-width:0;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow: 0 0 3px rgba(0,0,0,0.25);
    }

    .badge-sub{
      font-size: var(--hemma-badge-sub);
      font-weight: 500;
      line-height: 1.05;
      opacity: .82;
      color: rgba(255,255,255,0.90);
      min-width:0;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow: 0 0 3px rgba(0,0,0,0.20);
    }

    #name, #name *{ overflow: visible !important; }

    #container > #aspect-ratio,
    #img-cell,
    #name{
      position: relative !important;
      z-index: 6 !important;
      opacity: 1 !important;
    }


