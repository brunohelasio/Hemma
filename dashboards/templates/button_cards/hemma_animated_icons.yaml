# =========================================================
# BIBLIOTECA GLOBAL DE ÍCONES ANIMADOS AVANÇADOS (VERSÃO RESTAURADA)
# =========================================================

hemma_animated_base:
  show_icon: false
  show_entity_picture: false
  styles:
    img_cell:
      - display: none !important
    entity_picture:
      - display: none !important
    custom_fields:
      icone_animado:
        - position: absolute
        - top: 12%
        - left: 12%
        - width: 42px
        - height: 42px
        - pointer-events: none
        - z-index: 2

# ==========================================
# 1. LUZES (Restaurado: Brilho e Filamento)
# ==========================================
icon_lamp:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[
        let is_on = (entity && entity.state === 'on');
        let color = is_on ? '#e5b124' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes lamp-on { 0% { transform: scale(0.85); } 20% { transform: scale(1.1); } 40% { transform: scale(0.95); } 60% { transform: scale(1.03); } 80% { transform: scale(0.97); } }
              .on { animation: lamp-on 0.8s; transform-origin: center; filter: drop-shadow(0px 0px 4px rgba(229,177,36,0.6)); }
            </style>
            <path fill="${color}" class="${state_class}" d="M25 8.5c-6.8 0-12.3 5.5-12.3 12.3 0 4.3 2.2 8.1 5.5 10.3v3.1c0 1.5 1.2 2.7 2.7 2.7h8.2c1.5 0 2.7-1.2 2.7-2.7v-3.1c3.3-2.2 5.5-6 5.5-10.3C37.3 14 31.8 8.5 25 8.5zm-3.8 27.2v-1.9h7.6v1.9h-7.6zm3.8 8.1c-1.9 0-3.5-1.4-3.7-3.2h7.4c-.2 1.8-1.8 3.2-3.7 3.2z"/>
          </svg>
        `;
      ]]]

# ==========================================
# 2. TV SMART (Restaurado: Tela e Flicker)
# ==========================================
icon_tv:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[
        let s = (entity && entity.state) ? entity.state.toLowerCase() : "";
        let is_on = (s === "playing" || s === "on");
        let color = is_on ? '#7fdbe9' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        let path = `<path d="M46 9.2v27.5H4.1V9.2H46m2.4-2.4H1.6v32.3h46.7c.1 0 .1-32.3.1-32.3zM11.9 43.2h26.3c.6 0 1.1-.4 1.1-1v-.3c0-.6-.4-1.1-1-1.1H11.9c-.6 0-1.1.4-1.1 1v.3a1.11 1.11 0 0 0 1.1 1.1z"/>`;
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes turn-on { 0% { transform: scaleY(0); opacity: 0; } 100% { transform: scaleY(1); opacity: 1; } }
              @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.85; } }
              .on-screen { animation: turn-on 0.5s ease-out forwards, flicker 4s infinite 0.5s; transform-origin: center; }
            </style>
            <path class="${is_on ? 'on-screen' : ''}" d="M2.9,8h44.3v29.9H2.9V8z" fill="${is_on ? '#7fdbe950' : 'transparent'}"/>
            <g fill="${color}">${path}</g>
          </svg>
        `;
      ]]]

# ==========================================
# 3. SPOTIFY (Restaurado: Logo Pulsante)
# ==========================================
icon_spotify:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[
        let is_on = (entity && entity.state === 'playing');
        let color = is_on ? '#1DB954' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes pulse-beat { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(0.95); } }
              .on { animation: pulse-beat 1.5s infinite ease-in-out; transform-origin: center; }
            </style>
            <path fill="${color}" class="${state_class}" d="M25 .3C11.4.3.3 11.4.3 25S11.4 49.7 25 49.7 49.7 38.6 49.7 25 38.6.3 25 .3zm11.3 35.6c-.4.7-1.4 1-2.1.5-5.8-3.5-13.1-4.3-21.7-2.4-.8.2-1.7-.3-1.8-1.2-.2-.8.3-1.7 1.2-1.8 9.4-2.2 17.5-1.2 24 2.8.6.5.9 1.4.4 2.1zm3.1-6.7c-.6.9-1.7 1.2-2.6.6-6.6-4.1-16.8-5.3-24.6-2.9a1.96 1.96 0 0 1-2.4-1.3 1.96 1.96 0 0 1 1.3-2.4c9-2.7 20.1-1.4 27.7 3.3.8.6 1.1 1.8.6 2.7h0zm.2-7c-8-4.7-21.1-5.2-28.7-2.9-1.2.4-2.5-.3-2.9-1.5s.3-2.5 1.5-2.9c8.7-2.6 23.2-2.1 32.4 3.3 1.1.7 1.5 2.1.8 3.2-.6 1.1-2 1.4-3.1.8h0z"/>
          </svg>
        `;
      ]]]

# ==========================================
# 4. AR CONDICIONADO (Restaurado: Vento 3D)
# ==========================================
icon_climate:
  template: hemma_animated_base
  styles:
    custom_fields:
      icone_animado:
        - left: 16%
  custom_fields:
    icone_animado: >
      [[[
        let s = (entity && entity.state) ? entity.state.toLowerCase() : 'off';
        let is_on = (s !== 'off' && s !== 'unavailable');
        let color = is_on ? '#5daeea' : '#ffffff';
        return `
          <svg viewBox="0 0 50 50" fill="${color}">
            <style>
              @keyframes air-flow { 0% { transform: translateY(-3px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(5px); opacity: 0; } }
              .on .flow-1 { animation: air-flow 1.5s infinite linear; }
              .on .flow-2 { animation: air-flow 1.5s infinite linear 0.4s; }
              .on .flow-3 { animation: air-flow 1.5s infinite linear 0.8s; }
            </style>
            <g class="${is_on ? 'on' : ''}">
              <path d="M36.8 1.2v1.7a5.34 5.34 0 0 1-5.3 5.3H18.4a5.34 5.34 0 0 1-5.3-5.3V1.2c-2.6.4-4.7 2.8-4.7 5.6v12h33.2v-12c0-2.8-2.1-5.2-4.8-5.6zM15.7 1.9v-.8h18.6V3c0 1.5-1.2 2.8-2.8 2.8H18.4c-1.5 0-2.8-1.2-2.8-2.8V1.9z"/>
              <path class="flow-1" d="M18 26 h2 v8 h-2 z" opacity="0"/>
              <path class="flow-2" d="M24 26 h2 v8 h-2 z" opacity="0"/>
              <path class="flow-3" d="M30 26 h2 v8 h-2 z" opacity="0"/>
            </g>
          </svg>
        `;
      ]]]

# ==========================================
# 5. CORTINA / PERSIANA (Resolvido o Falso Pressionado)
# ==========================================
icon_shade:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[
        let is_on = (entity && (entity.state === 'open'));
        let color = is_on ? '#e5b124' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes shade-up { 0% { transform: scaleY(1); } 100% { transform: scaleY(0.15); } }
              .on .blind-slats { animation: shade-up 1.5s forwards cubic-bezier(0.25, 1, 0.5, 1); transform-origin: top; }
              .on .blind-cord { transform: translateY(-18px); transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1); }
            </style>
            <path fill="${color}" opacity="0.3" d="M8,6 h34 v38 h-34 z M11,9 v32 h28 v-32 z"/>
            <g class="${state_class}">
              <rect fill="${color}" x="8" y="6" width="34" height="4"/>
              <g class="blind-slats" transform="translate(11, 10)">
                <rect fill="${color}" x="0" y="0" width="28" height="3"/>
                <rect fill="${color}" x="0" y="6" width="28" height="3"/>
                <rect fill="${color}" x="0" y="12" width="28" height="3"/>
                <rect fill="${color}" x="0" y="18" width="28" height="3"/>
                <rect fill="${color}" x="0" y="24" width="28" height="3"/>
                <rect fill="${color}" x="0" y="30" width="28" height="3"/>
                <rect fill="${color}" x="-1" y="35" width="30" height="4"/>
              </g>
              <line class="blind-cord" x1="40" y1="10" x2="40" y2="34" stroke="${color}" stroke-width="1.5" opacity="0.8"/>
              <circle class="blind-cord" cx="40" cy="34" r="2" fill="${color}" opacity="0.8"/>
            </g>
          </svg>
        `;
      ]]]

# ==========================================
# 6. PORTA (Abertura 3D)
# ==========================================
icon_door:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[ 
        let is_on = (entity && (entity.state === 'on' || entity.state === 'open'));
        let color = is_on ? '#e5b124' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes door-swing { 0% { transform: perspective(0) rotateY(0); } 100% { transform: perspective(150px) rotateY(-40deg); } }
              .on .door-panel { animation: door-swing 0.6s forwards; transform-origin: 12px center; }
            </style>
            <path fill="${color}" d="M12,41V11c0-1.1,0.9-2,2-2h20c1.1,0,2,0.9,2,2v30h2V7H10v34H12z"/>
            <path class="door-panel ${state_class}" fill="${color}" d="M14,11v30h20V11H14z M28,28c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S29.1,28,28,28z"/>
            <rect fill="${color}" x="8" y="41" width="34" height="2"/>
          </svg>
        `; 
      ]]]

# ==========================================
# 7. PLANTA CASA 3D (Brilho Isométrico)
# ==========================================
icon_home_planta:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[ 
        let is_on = (entity && entity.state === 'on');
        let color = is_on ? '#e5b124' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes pulse-plan { 0%, 100% { filter: drop-shadow(0 0 2px rgba(229,177,36,0.4)); transform: scale(1) translateY(0); } 50% { filter: drop-shadow(0 0 6px rgba(229,177,36,0.8)); transform: scale(1.03) translateY(-1px); } }
              .on { animation: pulse-plan 2.5s infinite ease-in-out; transform-origin: center; }
            </style>
            <g class="${state_class}">
              <path fill="${color}" d="M25,8 L6,18 L25,28 L44,18 Z" opacity="0.9"/>
              <path fill="${color}" d="M6,18 L6,32 L25,42 L25,28 Z" opacity="0.6"/>
              <path fill="${color}" d="M44,18 L44,32 L25,42 L25,28 Z" opacity="0.4"/>
              <path fill="#ffffff" opacity="0.4" d="M25,12 L12,18 L20,23 L32,16 Z"/>
              <path fill="#ffffff" opacity="0.7" d="M35,18 L23,24 L25,26 L38,20 Z"/>
            </g>
          </svg>
        `; 
      ]]]

# ==========================================
# 8. ASPIRADOR ROBOROCK (Varredura Top-Down)
# ==========================================
icon_vacuum:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[ 
        let s = (entity && entity.state) ? entity.state.toLowerCase() : 'off';
        let is_on = (s === 'cleaning' || s === 'returning' || s === 'on');
        let color = is_on ? '#5daeea' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes clean { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 25% { transform: translate(2px, -1px) rotate(4deg); } 50% { transform: translate(0, -2px) rotate(0deg); } 75% { transform: translate(-2px, -1px) rotate(-4deg); } }
              @keyframes spin { 100% { transform: rotate(360deg); } }
              .on .robot { animation: clean 3s infinite ease-in-out; transform-origin: center; }
              .on .brush { animation: spin 0.7s infinite linear; transform-origin: 36px 14px; }
              .on .radar { animation: spin 2s infinite linear; transform-origin: 25px 25px; }
            </style>
            <g class="${state_class}" fill="${color}">
              <g class="robot">
                <circle cx="25" cy="25" r="18" opacity="0.9"/>
                <path d="M10,15 A18,18 0 0,1 40,15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
                <circle cx="25" cy="25" r="5" fill="#000000" opacity="0.3"/>
                <g class="radar">
                  <circle cx="25" cy="25" r="3.5" fill="${color}"/>
                  <circle cx="27" cy="25" r="1" fill="#ffffff"/>
                </g>
                <g class="brush" stroke="${color}" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
                  <line x1="36" y1="14" x2="41" y2="9"/>
                  <line x1="36" y1="14" x2="41" y2="19"/>
                  <line x1="36" y1="14" x2="31" y2="19"/>
                </g>
              </g>
            </g>
          </svg>
        `;
      ]]]

# ==========================================
# 9. CÂMERA SEGURANÇA (Giro e Gravação)
# ==========================================
icon_doorbell:
  template: hemma_animated_base
  custom_fields:
    icone_animado: >
      [[[ 
        let is_on = (entity && entity.state === 'on');
        let color = is_on ? '#f44336' : '#ffffff';
        let state_class = is_on ? 'on' : '';
        return `
          <svg viewBox="0 0 50 50">
            <style>
              @keyframes pan { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }
              @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
              .on .cam { animation: pan 4s infinite ease-in-out; transform-origin: 25px 16px; }
              .on .led { animation: blink 1.5s infinite; fill: #ff4d4d; }
            </style>
            <path fill="${color}" d="M16,6 h18 v5 h-18 z" opacity="0.6"/>
            <g class="${state_class}">
              <g class="cam">
                <path fill="${color}" d="M15,11 h20 v20 a10,10 0 0,1 -20,0 z"/>
                <circle fill="#000000" opacity="0.3" cx="25" cy="23" r="6"/>
                <circle class="led" fill="${color}" cx="25" cy="14" r="2" opacity="0.8"/>
              </g>
            </g>
          </svg>
        `; 
      ]]]