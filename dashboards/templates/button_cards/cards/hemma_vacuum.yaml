hemma_vacuum:
  template: [hemma_entity]

  show_entity_picture: true
  show_icon: false
  show_label: false

  name: Vacuum

  tap_action:
    action: more-info

  hold_action:
    action: more-info

  triggers_update:
    - '[[[ return entity?.entity_id ]]]'

  state:
    - operator: template
      value: |
        [[[
          const s = (entity?.state || '').toLowerCase();
          return ['cleaning', 'returning'].includes(s);
        ]]]
      styles:
        card:
          - background: var(--ha-card-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-active, var(--primary-text-color))
        state:
          - color: var(--secondary-text-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important

  entity_picture: |
    [[[
      const s = (entity?.state || '').toLowerCase();
      if (s === 'cleaning' || s === 'returning') return '/local/hemma/icons/vacuum-clean.svg';
      if (s === 'charging')                      return '/local/hemma/icons/vacuum-charge.svg';
      return '/local/hemma/icons/vacuum.svg';
    ]]]

  show_entity_picture: |
    [[[
      const s = (entity?.state || '').toLowerCase();
      return !['unknown', 'unavailable'].includes(s);
    ]]]

  extra_styles: |
    #img-cell { overflow: visible !important; }
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }