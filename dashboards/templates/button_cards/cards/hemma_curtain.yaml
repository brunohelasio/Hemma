hemma_curtain:
  template: [hemma_entity]

  show_entity_picture: true
  show_icon: false
  show_name: true
  show_state: true
  name: Curtain

  tap_action:
    action: more-info

  hold_action:
    action: toggle

  state:
    - operator: template
      value: |
        [[[
          const s = (entity?.state || '').toLowerCase();
          return ['open', 'opening'].includes(s);
        ]]]
      styles:
        card:
          - background: var(--ha-card-background-active)
          - box-shadow: var(--button-card-box-shadow-active, var(--button-card-box-shadow)) !important
        name:
          - color: var(--hemma-entity-active, var(--primary-text-color))
        state:
          - color: var(--secondary-text-color)
        img_cell:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important
        entity_picture:
          - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
          - filter: var(--hemma-entity-picture-active-filter, none) !important

  icon_tap_action:
    action: call-service
    service: |
      [[[
        const s = (entity?.state || '').toLowerCase();
        return ['open', 'opening'].includes(s) ? 'cover.close_cover' : 'cover.open_cover';
      ]]]
    service_data:
      entity_id: '[[[ return entity.entity_id ]]]'

  entity_picture: |
    [[[
      const s = (entity?.state || '').toLowerCase();
      return ['open', 'opening'].includes(s)
        ? '/local/Hemma-main/www/hemma/icons/curtain-open.svg'
        : '/local/Hemma-main/www/hemma/icons/curtain-closed.svg';
    ]]]

  extra_styles: |
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
