hemma_light:
  template:
    - hemma_entity

  show_icon: true
  show_last_changed: false

  state_display: >
    [[[
      const expand = (eid, seen = new Set()) => {
        if (!eid || seen.has(eid)) return [];
        seen.add(eid);

        const st = states[eid];
        if (!st) return [];

        const members = st.attributes?.entity_id;
        if (Array.isArray(members)) {
          return members.flatMap(m => expand(m, seen));
        }

        return [eid];
      };

      const root = entity?.entity_id;
      const all = [...new Set(expand(root))].filter(eid => eid.startsWith("light."));
      const onCount = all.filter(eid => states[eid]?.state === "on").length;

      return onCount > 0 ? `${onCount} On` : "Off";
    ]]]

  variables:
    show_toggle: true
    toggle_service: script.turn_on
    toggle_service_data: |
      [[[
        return {
          entity_id: 'script.hemma_light_smart_toggle',
          variables: {
            light_entity: entity.entity_id
          }
        };
      ]]]

  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  styles:
    entity_picture:
      - width: 100%
      - height: 100%
      - object-fit: contain
      - opacity: 0.8
      - transition: opacity 0.2s ease, filter 0.2s ease, transform 0.15s ease
      - cursor: pointer

    img_cell:
      - background: transparent !important
      - box-shadow: none !important
      - transition: filter 0.2s ease
      - cursor: pointer

  extra_styles: |
    @media (hover: hover) {
      #img-cell:hover {
        transform: scale(1.05);
        transition: transform 0.15s ease;
      }
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
    }

    @media (hover: none) {
      #img-cell:active {
        transform: scale(1.05);
      }
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
    }