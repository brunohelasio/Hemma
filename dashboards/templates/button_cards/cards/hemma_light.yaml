hemma_light:
  template:
    - hemma_entity

  # IMPORTANT: icon_tap_action needs the icon slot to exist.
  # This doesn't force an HA icon to show; your entity_picture still renders in img_cell.
  show_icon: true
  show_last_changed: false

  state_display: >
    [[[
      const expand = (eid, seen = new Set()) => {
        if (!eid || seen.has(eid)) return [];
        seen.add(eid);

        const st = states[eid];
        if (!st) return [];

        const members = st.attributes?.entity_id;
        if (Array.isArray(members)) {
          return members.flatMap(m => expand(m, seen));
        }

        return [eid];
      };

      const root = entity?.entity_id;
      const all = [...new Set(expand(root))].filter(eid => eid.startsWith("light."));
      const onCount = all.filter(eid => states[eid]?.state === "on").length;

      return onCount > 0 ? `${onCount} On` : "Off";
    ]]]

  variables:
    show_toggle: true

  # Tap anywhere (including icon/picture area) = more-info
  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  # Override the toggle button from hemma_entity to call the smart toggle script
  custom_fields:
    toggle:
      card:
        type: custom:button-card
        entity: '[[[ return entity.entity_id ]]]'
        show_name: false
        show_state: false
        show_icon: false
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.hemma_light_smart_toggle
            variables:
              light_entity: '[[[ return entity.entity_id ]]]'
        custom_fields:
          svg: |
            [[[
              const KF_ID = 'hemma-toggle-kf-v5';
              if (!document.getElementById(KF_ID)) {
                const s = document.createElement('style');
                s.id = KF_ID;
                s.textContent = [
                  '@keyframes hemma-thumb-on-d{from{transform:translateX(0)}to{transform:translateX(16px)}}',
                  '@keyframes hemma-thumb-off-d{from{transform:translateX(16px)}to{transform:translateX(0)}}',
                  '@keyframes hemma-thumb-on-m{from{transform:translateX(0)}to{transform:translateX(16px)}}',
                  '@keyframes hemma-thumb-off-m{from{transform:translateX(16px)}to{transform:translateX(0)}}'
                ].join('');
                document.head.appendChild(s);
              }
              const activeStates = ["on","open","opening","playing","unlocked","cleaning","returning","cool","heat"];
              const isOn = activeStates.includes((entity?.state || "").toLowerCase());
              const mob = window.matchMedia('(max-width: 767px), (max-height: 600px)').matches;
              const W = mob ? 36 : 40, H = mob ? 20 : 24, r = mob ? 6 : 7, cx0 = mob ? 11 : 13;
              const SW = W + 2;
              const travel = mob ? 16 : 16;
              const stateKey = '_hemma_toggle_' + entity.entity_id;
              const shouldAnimate = window[stateKey] !== undefined && window[stateKey] !== isOn;
              window[stateKey] = isOn;
              const anim = isOn ? (mob ? 'hemma-thumb-on-m' : 'hemma-thumb-on-d') : (mob ? 'hemma-thumb-off-m' : 'hemma-thumb-off-d');
              const animStyle = shouldAnimate ? `animation:${anim} 0.2s ease forwards;` : '';
              const circleCx = (!shouldAnimate && isOn) ? cx0 + travel : cx0;
              const mid = 'htm-' + entity.entity_id.replace(/[^a-z0-9]/gi, '-');
              if (isOn) {
                return `<svg width="${SW}" height="${H}" viewBox="0 0 ${SW} ${H}" style="display:block;overflow:visible;"><defs><mask id="${mid}"><rect x="2" y="1" width="${W-2}" height="${H-2}" rx="${(H-2)/2}" fill="white"/><circle cx="${circleCx}" cy="${H/2}" r="${r}" fill="black" style="${animStyle}"/></mask></defs><rect x="2" y="1" width="${W-2}" height="${H-2}" rx="${(H-2)/2}" fill="rgba(255,255,255,0.7)" mask="url(#${mid})"/></svg>`;
              } else {
                return `<svg width="${SW}" height="${H}" viewBox="0 0 ${SW} ${H}" style="display:block;overflow:visible;"><rect x="2" y="1" width="${W-2}" height="${H-2}" rx="${(H-2)/2}" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/><circle cx="${circleCx}" cy="${H/2}" r="${r}" fill="rgba(255,255,255,0.4)" style="${animStyle}"/></svg>`;
              }
            ]]]
        styles:
          card:
            - background: transparent !important
            - background-color: transparent !important
            - --ha-card-background: transparent
            - box-shadow: none !important
            - border: none !important
            - backdrop-filter: none !important
            - "-webkit-backdrop-filter": none !important
            - padding: 0 !important
            - overflow: visible !important
            - "--button-card-ripple-color": transparent !important
            - "-webkit-tap-highlight-color": transparent !important
            - border-radius: 0 !important
          grid:
            - padding: 0 !important
            - overflow: visible !important
          custom_fields:
            svg:
              - line-height: 0
        extra_styles: |
          :host {
            display: block !important;
            width: 42px !important;
            height: 24px !important;
            overflow: visible !important;
            cursor: pointer;
          }
          @media (max-width: 767px), (max-height: 600px) {
            :host { width: 38px !important; height: 20px !important; }
          }
          ha-card, #container {
            overflow: visible !important;
            background: transparent !important;
            --ha-card-background: transparent !important;
          }
          @media (hover: hover) {
            :host { transition: filter 0.2s ease; }
            :host(:hover) { filter: brightness(1.5) !important; }
          }

  styles:
    entity_picture:
      - width: 100%
      - height: 100%
      - object-fit: contain
      - opacity: 0.8
      - transition: opacity 0.2s ease, filter 0.2s ease, transform 0.15s ease
      - cursor: pointer

    img_cell:
      - background: transparent !important
      - box-shadow: none !important
      - transition: filter 0.2s ease
      - cursor: pointer

  extra_styles: |
    @media (hover: hover) {
      #img-cell:hover {
        transform: scale(1.05);
        transition: transform 0.15s ease;
      }
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
    }

    @media (hover: none) {
      #img-cell:active {
        transform: scale(1.05);
      }
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
      }
    }
