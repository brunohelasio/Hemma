hemma_lock:
  template: [hemma_entity]

  show_entity_picture: true
  show_icon: true
  show_label: false

  entity_picture: |
    [[[
      if (entity.state === 'unlocked') return '/local/Hemma-main/www/hemma/icons/lock-open.svg';
      if (entity.state === 'unlocking') return '/local/Hemma-main/www/hemma/icons/lock-unlocking.svg';
      return '/local/Hemma-main/www/hemma/icons/lock.svg';
    ]]]

  state_display: |
    [[[
      const state = entity.state;
      if (state === 'locked') {
        return "Locked";
      } else if (state === 'unlocked') {
        return "Unlocked";
      } else if (state === 'locking') {
        return "Locking...";
      } else if (state === 'unlocking') {
        return "Unlocking...";
      } else {
        return "Unknown";
      }
    ]]]

  tap_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  icon_tap_action:
    action: call-service
    service: |
      [[[
        return entity.state === 'locked' ? 'lock.unlock' : 'lock.lock';
      ]]]
    service_data:
      entity_id: '[[[ return entity.entity_id ]]]'

  icon_hold_action:
    action: more-info
    entity: '[[[ return entity.entity_id ]]]'

  styles:
    img_cell:
      - color: var(--hemma-entity-active, var(--primary-text-color)) !important
    entity_picture:
      - opacity: var(--hemma-entity-picture-active-opacity, 1) !important
    icon:
      - color: var(--hemma-entity-active, var(--primary-text-color)) !important

  extra_styles: |
    #img-cell { overflow: visible !important; }
    /* Hover effect for desktop */
    @media (hover: hover) {
      #img-cell:hover img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
    /* Active effect for touch */
    @media (hover: none) {
      #img-cell:active img {
        opacity: 1 !important;
        filter: brightness(1.2) !important;
        transform: scale(1.05);
      }
    }
