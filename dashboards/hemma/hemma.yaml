# /config/Hemma-main/dashboards/hemma/hemma.yaml.example
# Hemma Dashboard - Example Configuration
# ============================================================================
# Copy or rename this file to hemma.yaml and customize the entity IDs to match
# your Home Assistant setup. Search for "YOUR_" to find all placeholders.
#
# REQUIRED: Replace all entity IDs with your own entities
# OPTIONAL: Adjust room names, add/remove rooms, customize features
# ============================================================================

button_card_templates: !include_dir_merge_named /config/Hemma-main/dashboards/templates/button_cards

# Kiosk Mode (optional - requires kiosk-mode HACS integration)
# Uncomment and customize if you want to hide certain UI elements
# kiosk_mode:
#   hide_header: true
#   hide_sidebar: false
#   hide_dialog_light_settings_actions: true
#   hide_dialog_logbook: true
#   mobile_settings:
#     hide_header: true
#     hide_sidebar: false
#   user_settings:
#     - users:
#       - "tablet"
#       hide_header: true
#       hide_sidebar: false
#       hide_dialog_logbook: true
#       hide_dialog_light_settings_actions: true
#       hide_dialog_header_breadcrumb_navigation: true
#       hide_dialog_header_history: true
#       hide_dialog_attributes: true

views:
  # ------------------------------------------------------
  # HOME
  # ------------------------------------------------------
  # The main overview room - typically shows whole-home controls
  # and media player status across all rooms
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: home
    path: home
    layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_screen_layout.yaml
    cards:
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Home
        variables:
          # Image Configuration
          # Place your images at: /config/Hemma-main/www/hemma/rooms/home.jpg (light mode)
          #                       /config/Hemma-main/www/hemma/rooms/home-night.jpg (dark mode)
          image: home
          image_position: center center

          # Climate (shows group badge + expandable sub-badges for temp/humidity/quality)
          show_climate: false
          # climate_entity_1: climate.YOUR_THERMOSTAT
          # climate_entity_2: climate.YOUR_THERMOSTAT_2   # optional, up to 3

          # Sensors (used by the climate sub-badges when show_climate is true)
          # temp_sensor_1: sensor.YOUR_HOME_TEMPERATURE
          # temp_sensor_2: sensor.YOUR_TEMPERATURE_2      # optional additional temp sensor
          # temp_sensor_3: sensor.YOUR_TEMPERATURE_3      # optional additional temp sensor
          # temp_sensor_4: sensor.YOUR_TEMPERATURE_4      # optional additional temp sensor
          # humidity_sensor: sensor.YOUR_HUMIDITY
          # quality_sensor: sensor.YOUR_AIR_QUALITY

          # Lights Badge (optional - shows a light group badge)
          show_lights: true
          light_group_entity: light.grupo_luzes_sala
          light_entity_1: light.sala_switch_1
          light_entity_2: light.sala_switch_2
          light_entity_3: light.sala_switch_3
          light_entity_4: light.sala_2_switch_2

          # Weather Widget
          show_weather: false
          # weather_entity: weather.home
          # weather_temp_sensor: sensor.outdoor_temperature

          # Temperature Unit (affects comfort labels like "Cool", "Warm", etc.)
          temp_unit: 'F'                                  # 'F' for Fahrenheit, 'C' for Celsius

          # Presence Badges (optional - requires person/status sensors)
          # Shows a group badge on the hero card; tap to expand individual badges
          show_presence: false
          # presence_entity_1: sensor.YOUR_PERSON_1_STATUS  # optional, up to 4
          # presence_entity_2: sensor.YOUR_PERSON_2_STATUS
          # presence_entity_3: sensor.YOUR_PERSON_3_STATUS
          # presence_entity_4: sensor.YOUR_PERSON_4_STATUS

          # Media Player Badges (shows what's playing across rooms)
          show_media: true
          show_media_player_1: true
          media_player_1: media_player.android_tv_192_168_3_17
          show_media_player_2: true
          media_player_2: media_player.echo_show
          show_media_player_3: true
          media_player_3: media_player.echo_pop_quarto_casal
          show_media_player_4: true
          media_player_4: media_player.echo_pop_marina

      # MOBILE NAVBAR
      - !include /config/Hemma-main/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          # Thermostat (configure when room temperature sensor is available)
          # - type: custom:button-card
          #   template: hemma_thermostat
          #   entity: climate.ac_office
          #   name: Thermostat
          #   variables:
          #     temp_sensor: sensor.office_temperature

          # Front Door Lock
          - type: custom:button-card
            template: hemma_lock
            entity: lock.sl_fechadura_operate_lock
            name: Front Door
            variables:
              icon: door
              show_toggle: true

          - type: custom:button-card
            template: hemma_light
            entity: light.grupo_luzes_sala
            name: Sala
            variables:
              icon: living-room

          - type: custom:button-card
            template: hemma_light
            entity: light.grupo_luzes_cozinha
            name: Cozinha
            variables:
              icon: kitchen

          - type: custom:button-card
            template: hemma_light
            entity: light.grupo_quarto_casal
            name: Quarto Casal
            variables:
              icon: bedroom

          # Doorbell Camera
          - type: custom:button-card
            template: hemma_doorbell
            entity: camera.sl_camera_2
            name: Sala Camera
            variables:
              icon: doorbell

          # Network/Energy/Updates cards intentionally disabled until sensors are mapped.

          # Motion Overview Card
          # Shows active room name when motion is detected, "Clear" when none.
          # Sensor entity IDs for navbar badge are configured separately
          # in packages/hemma_helpers.yaml (input_text section).
          # - type: custom:button-card
          #   template: hemma_motion
          #   variables:
          #     default_name: Home          # shown when no motion detected
          #     sensor_1: binary_sensor.living_room_hub_motion
          #     label_1: Living Room
          #     sensor_2: binary_sensor.hue_motion_sensor_motion
          #     label_2: Bedroom
          #     sensor_3: binary_sensor.YOUR_KITCHEN_MOTION
          #     label_3: Kitchen

  # ------------------------------------------------------
  # LIVING ROOM
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: living-room
    path: living-room
    layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_screen_layout.yaml
    cards:
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Living Room
        variables:
          image: livingroom
          image_position: center center

          # Climate (optional - shows group badge + expandable sub-badges for temp/humidity/quality)
          show_climate: false
          # climate_entity_1: climate.YOUR_LIVING_ROOM_CLIMATE

          # Sensors (used by the climate sub-badges when show_climate is true)
          # temp_sensor_1: sensor.YOUR_LIVING_ROOM_TEMP
          # temp_sensor_2: sensor.YOUR_TEMP_2          # optional additional sensors
          # humidity_sensor: sensor.YOUR_LIVING_ROOM_HUMIDITY
          # quality_sensor: sensor.YOUR_AIR_QUALITY

          # Light Badge (optional)
          show_lights: true
          light_entity_1: light.grupo_luzes_sala

          # Weather Widget (optional - set show_weather: true and add weather_entity to enable)
          show_weather: false
          # weather_entity: weather.YOUR_WEATHER
          # weather_temp_sensor: sensor.YOUR_OUTDOOR_TEMP
          temp_unit: 'F'                                  # 'F' for Fahrenheit, 'C' for Celsius

          # Media Player Badges (optional - shows what's playing in this room)
          show_media: true
          show_media_player_1: true
          media_player_1: media_player.android_tv_192_168_3_17
          show_media_player_2: true
          media_player_2: media_player.echo_show

      # MOBILE NAVBAR
      - !include /config/Hemma-main/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          - type: custom:button-card
            template: hemma_media
            entity: media_player.android_tv_192_168_3_17
            name: Smart TV Pro
            variables:
              icon: tv
              show_progress: true
              progress_entity: media_player.android_tv_192_168_3_17

          - type: custom:button-card
            template: hemma_media
            entity: media_player.echo_show
            name: Echo Show
            variables:
              icon: speaker
              show_toggle: true

          - type: custom:button-card
            template: hemma_media
            entity: media_player.echo_pop_quarto_casal
            name: Echo Quarto Casal
            variables:
              icon: speaker

          - type: custom:button-card
            template: hemma_light
            entity: light.grupo_luzes_sala
            name: Luzes Sala
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light
            entity: light.varanda_switch_1
            name: Area Gourmet
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_doorbell
            entity: camera.vr_camera_2
            name: Varanda Camera
            variables:
              icon: doorbell

  # ------------------------------------------------------
  # KITCHEN
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: kitchen
    path: kitchen
    layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_screen_layout.yaml
    cards:
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Kitchen
        variables:
          image: kitchen
          image_position: center center

          # Climate (optional - shows group badge + expandable sub-badges for temp/humidity/quality)
          show_climate: false
          # climate_entity_1: climate.YOUR_KITCHEN_CLIMATE

          # Sensors (used by the climate sub-badges when show_climate is true)
          # temp_sensor_1: sensor.YOUR_KITCHEN_TEMP
          # humidity_sensor: sensor.YOUR_KITCHEN_HUMIDITY
          # quality_sensor: sensor.YOUR_AIR_QUALITY

          show_weather: false
          # weather_entity: weather.YOUR_WEATHER
          # weather_temp_sensor: sensor.YOUR_OUTDOOR_TEMP
          temp_unit: 'F'

          # Light Badge (optional)
          show_lights: true
          light_entity_1: light.grupo_luzes_cozinha

          # Media Player Badges (optional)
          show_media: false
          # show_media_player_1: true
          # media_player_1: media_player.YOUR_KITCHEN_PLAYER

      # MOBILE NAVBAR
      - !include /config/Hemma-main/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          - type: custom:button-card
            template: hemma_doorbell
            entity: camera.cz_camera_2
            name: Cozinha Camera
            variables:
              icon: doorbell

          - type: custom:button-card
            template: hemma_doorbell
            entity: camera.as_camera_2
            name: Lavanderia Camera
            variables:
              icon: doorbell

          - type: custom:button-card
            template: hemma_light
            entity: light.grupo_luzes_cozinha
            name: Luzes Cozinha
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light
            entity: light.cozinha_switch_2
            name: Cozinha Principal
            variables:
              icon: light

  # ------------------------------------------------------
  # BEDROOM
  # ------------------------------------------------------
  - type: custom:grid-layout
    title: bedroom
    path: bedroom
    layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_screen_layout.yaml
    cards:
      # ROOM HERO CARD
      - type: custom:button-card
        template: hemma_room
        name: Bedroom
        variables:
          image: bedroom
          image_position: center center

          # Climate (optional - shows group badge + expandable sub-badges for temp/humidity/quality)
          show_climate: false
          # climate_entity_1: climate.YOUR_BEDROOM_CLIMATE

          # Sensors (used by the climate sub-badges when show_climate is true)
          # temp_sensor_1: sensor.YOUR_BEDROOM_TEMP
          # humidity_sensor: sensor.YOUR_BEDROOM_HUMIDITY
          # quality_sensor: sensor.YOUR_BEDROOM_AIR_QUALITY

          show_weather: false
          # weather_entity: weather.YOUR_WEATHER
          # weather_temp_sensor: sensor.YOUR_OUTDOOR_TEMP
          temp_unit: 'F'

          # Light Badge (optional)
          show_lights: true
          light_entity_1: light.grupo_quarto_casal

          # Media Player Badges (optional)
          show_media: true
          show_media_player_1: true
          media_player_1: media_player.echo_pop_quarto_casal
          show_media_player_2: true
          media_player_2: media_player.echo_pop_marina

      # MOBILE NAVBAR
      - !include /config/Hemma-main/dashboards/templates/includes/hemma_navbar_mobile.yaml

      # ENTITY CARDS
      - type: custom:layout-card
        class: hemma-entities
        layout_type: custom:grid-layout
        layout: !include /config/Hemma-main/dashboards/templates/includes/hemma_entity_layout.yaml
        cards:
          - type: custom:button-card
            template: hemma_media
            entity: media_player.echo_pop_quarto_casal
            name: Echo Quarto Casal
            variables:
              icon: speaker

          - type: custom:button-card
            template: hemma_media
            entity: media_player.echo_pop_marina
            name: Echo Marina
            variables:
              icon: speaker
              show_toggle: true

          - type: custom:button-card
            template: hemma_doorbell
            entity: camera.camera_quarto_casal_2
            name: Camera Quarto Casal
            variables:
              icon: doorbell

          - type: custom:button-card
            template: hemma_light
            entity: light.grupo_quarto_casal
            name: Luzes Quarto Casal
            variables:
              icon: light

          - type: custom:button-card
            template: hemma_light
            entity: light.qc_luz_principal
            name: Luz Principal
            variables:
              icon: light
