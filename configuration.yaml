homeassistant:
  packages: !include_dir_named packages
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
template: !include sensors.yaml

lovelace:
  mode: "storage"
  resources:
    - type: "module"
      url: "/hacsfiles/button-card/button-card.js"
    - type: "module"
      url: "/hacsfiles/kiosk-mode/kiosk-mode.js"
    - type: "module"
      url: "/local/Hemma-main/www/layout-card-modified/layout-card-modified.js"
    - type: "module"
      url: "/local/Hemma-main/www/navbar-popup-caret/navbar-popup-caret.js"
    - type: "module"
      url: "/local/Hemma-main/www/navbar-sidebar-offset/navbar-sidebar-offset.js"
    - type: "css"
      url: "/local/Hemma-main/www/hemma/fonts/hanken-grotesk.css"
  dashboards:
    dashboard-hemma:
      mode: yaml
      title: "Hemma"
      icon: mdi:home
      show_in_sidebar: true
      filename: Hemma-main/dashboards/hemma/hemma.yaml
